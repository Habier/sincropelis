name: Build

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SincroPelis/SincroPelis.csproj

      - name: Build
        run: dotnet build SincroPelis/SincroPelis.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish SincroPelis/SincroPelis.csproj --configuration Release --output ./publish
